name: Release

# Builds the platform binaries we cannot build on the local Linux/Docker machine and
# publishes them as a downloadable GitHub Release. GitHub provides the OS-native
# runners — windows-latest (MSVC) and macos-latest (Xcode) — free for public repos.
# Windows is the primary/reference target; the others are wired up for when we expand.
#
# Trigger: push a tag like `v0.1.0-alpha.1` (publishes a pre-release), or run manually
# via workflow_dispatch (uploads artifacts only, no release).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: app

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }
      # super_native_extensions (drag-out) builds a Rust crate via cargokit.
      - uses: dtolnay/rust-toolchain@stable
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath airclone-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: airclone-windows-x64
          path: app/airclone-windows-x64.zip
      - name: Publish to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/airclone-windows-x64.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        # libmpv-dev + mpv are required by media_kit (video/audio preview) on Linux —
        # without them `flutter build linux` fails to link (regressed in alpha.6).
        run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev libmpv-dev mpv
      - uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }
      # super_native_extensions (drag-out) builds a Rust crate via cargokit.
      - uses: dtolnay/rust-toolchain@stable
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package
        run: tar -czf airclone-linux-x64.tar.gz -C build/linux/x64/release/bundle .
      - uses: actions/upload-artifact@v4
        with:
          name: airclone-linux-x64
          path: app/airclone-linux-x64.tar.gz
      - name: Publish to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/airclone-linux-x64.tar.gz
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }
      # super_native_extensions (drag-out) builds a Rust crate via cargokit.
      - uses: dtolnay/rust-toolchain@stable
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter build macos --release
      # Code-signing + notarization are added later (require an Apple Developer ID).
      - name: Package
        run: |
          cd build/macos/Build/Products/Release
          zip -r -y ../../../../../airclone-macos.zip Airclone.app
      - uses: actions/upload-artifact@v4
        with:
          name: airclone-macos
          path: app/airclone-macos.zip
      - name: Publish to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/airclone-macos.zip
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

  android:
    runs-on: ubuntu-latest
    # Android APK build, fixed after being red since alpha.3. Two parts:
    #  1) This job needs the Rust toolchain (below): super_native_extensions /
    #     irondash_engine_context compile a Rust crate via cargokit for the Android
    #     ABIs, so cargo must be on PATH (rustup adds the *-linux-android targets).
    #  2) The android module is pinned to AGP 8.9.1 / Gradle 8.11.1 (see
    #     android/settings.gradle.kts + gradle-wrapper.properties) because cargokit's
    #     Gradle plugin calls Project.exec(), which Gradle 9 removed — and Flutter
    #     3.44's template defaults to Gradle 9 / AGP 9.
    # Verified locally: a 119 MB multi-ABI release APK builds with Temurin 17 (this
    # job's JDK — its jlink is required by AGP's JdkImageTransform). Kept best-effort
    # until a tagged CI run confirms the NDK auto-provisions on the runner; then this
    # continue-on-error can be dropped.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }
      - uses: dtolnay/rust-toolchain@stable
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: airclone-android-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
      - name: Publish to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/app/outputs/flutter-apk/app-release.apk
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
